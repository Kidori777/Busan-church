<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 밥상</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#FAF7F2;font-family:'Noto Sans KR',sans-serif}
:root{
  --cream:#FAF7F2;--dark:#2C1810;--terra:#C4713A;
  --taupe:#8B6F5E;--sand:#E8D9C5;--hi:#F5E8D6;--body:#4A3728;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(100%)}to{transform:none}}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(38px);transition:opacity .9s ease,transform .9s ease}
.reveal.vis{opacity:1;transform:none}

/* ════════════════════════ HERO ════════════════════════ */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
#hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#5C3D2E 0%,#2C1810 100%);background-size:cover;background-position:center;transition:background .5s}
#hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(44,24,16,.2) 0%,rgba(44,24,16,.62) 55%,rgba(44,24,16,.92) 100%)}
#hero-ct{position:relative;z-index:2;text-align:center;color:#FAF7F2;padding:2rem;max-width:820px;animation:fadeUp 1s ease}
.h-sub{font-size:clamp(.75rem,1.6vw,.9rem);letter-spacing:.32em;color:rgba(250,247,242,.55);margin-bottom:1.1rem}
.h-name{font-family:'Noto Serif KR',serif;font-size:clamp(2.8rem,7vw,5.5rem);font-weight:700;letter-spacing:-.02em;line-height:1.1;text-shadow:0 2px 24px rgba(0,0,0,.4)}
#hero-msg{font-family:'Dancing Script',cursive;font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:600;line-height:1.8;color:#F5E8D6;white-space:pre-line;margin:1.8rem 0 1.2rem;text-shadow:0 1px 12px rgba(0,0,0,.2)}
#hero-scroll{position:absolute;bottom:2.5rem;left:50%;animation:float 2.2s ease-in-out infinite;z-index:2;display:flex;flex-direction:column;align-items:center;gap:.35rem;color:rgba(250,247,242,.45);font-size:.7rem;letter-spacing:.18em;cursor:pointer}

/* ════════════════════════ SECTIONS ════════════════════════ */
.sec{padding:clamp(4rem,8vw,8rem) clamp(1.5rem,5vw,3rem);max-width:1100px;margin:0 auto}
.sec-lbl{font-size:.72rem;letter-spacing:.32em;color:var(--terra);text-transform:uppercase;margin-bottom:1.3rem;display:flex;align-items:center;gap:1rem}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--sand)}
.sec-ttl{font-family:'Noto Serif KR',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;color:var(--dark);line-height:1.3}

/* ════════════════════════ MENU ════════════════════════ */
.mn-img-wrap{position:relative;border-radius:3px;overflow:hidden;aspect-ratio:4/5;flex-shrink:0}
.mn-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
.mn-img-wrap:hover img{transform:scale(1.045)}
.mn-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem}
.mn-tag{display:inline-block;font-size:.68rem;letter-spacing:.2em;color:var(--terra);border:1px solid var(--terra);padding:.28rem .85rem;border-radius:20px;margin-bottom:1.1rem}
.mn-name{font-family:'Noto Serif KR',serif;font-size:clamp(1.5rem,3vw,2.3rem);font-weight:700;color:var(--dark);margin:.3rem 0 .4rem}
.mn-story{font-family:'Noto Serif KR',serif;font-size:clamp(.95rem,2vw,1.1rem);line-height:2.05;color:var(--body);margin:1.2rem 0}
.mn-price{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--terra)}

/* SINGLE layout */
.layout-single{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,5rem);align-items:center;margin-top:3rem}
/* MULTI layout */
.layout-multi{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,5rem);align-items:center;margin-top:4rem;padding-bottom:4rem;border-bottom:1px solid var(--sand)}
.layout-multi:last-child{border-bottom:none}
.layout-multi.flip .mn-img-wrap{order:2}
.layout-multi.flip .mn-txt{order:1}
/* LIST layout */
.layout-list{margin-top:2rem;border-top:2px solid var(--dark)}
.side-row{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 0;border-bottom:1px solid var(--sand)}
.s-nm{font-size:.93rem;color:var(--body)}
.s-pr{font-size:.88rem;color:var(--taupe)}

/* ════════════════════════ REVIEWS ════════════════════════ */
#rev-sec{background:var(--dark);padding:clamp(4rem,8vw,8rem) 0}
.rev-in{max-width:1100px;margin:0 auto;padding:0 clamp(1.5rem,5vw,3rem)}
#rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:1.15rem;margin-top:3rem}
.rev-card{background:rgba(250,247,242,.06);border:1px solid rgba(250,247,242,.1);border-radius:4px;padding:1.75rem}
.rev-q{font-family:'Playfair Display',serif;font-size:3.4rem;color:var(--terra);line-height:1;font-style:italic;opacity:.4;margin-bottom:.25rem}
.rev-txt{font-family:'Noto Serif KR',serif;font-size:.96rem;line-height:1.9;color:rgba(250,247,242,.82);margin-bottom:1.1rem}
.rev-nm{font-size:.77rem;color:var(--terra);letter-spacing:.1em}
.rev-dt{font-size:.71rem;color:rgba(250,247,242,.28);margin-top:.18rem}

/* ════════════════════════ CONTACT ════════════════════════ */
#ct-sec{background:var(--cream);border-top:2px solid var(--sand);padding:clamp(3rem,6vw,6rem) clamp(1.5rem,5vw,3rem)}
.ct-in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.ct-row{display:flex;gap:1rem;margin-bottom:.85rem;align-items:flex-start}
.ct-lbl{font-size:.71rem;letter-spacing:.2em;color:var(--terra);min-width:52px;padding-top:.1rem}
.ct-val{font-family:'Noto Serif KR',serif;font-size:.92rem;color:var(--body);line-height:1.65}
.ct-motto{background:var(--hi);border-radius:8px;padding:2rem;text-align:center}
#ct-footer{max-width:1100px;margin:0 auto;padding:1.5rem clamp(1.5rem,5vw,3rem) 0;text-align:center;font-size:.72rem;color:var(--taupe);opacity:.5}

/* ════════════════════════ ADMIN TRIGGER ════════════════════════ */
#adm-btn{position:fixed;bottom:2rem;right:2rem;width:52px;height:52px;border-radius:50%;background:var(--dark);color:var(--cream);border:none;cursor:pointer;font-size:1.2rem;box-shadow:0 4px 20px rgba(44,24,16,.5);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s}
#adm-btn:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(44,24,16,.6)}

/* ════════════════════════ PASSWORD MODAL ════════════════════════ */
#pw-ov{display:none;position:fixed;inset:0;background:rgba(44,24,16,.88);z-index:200;align-items:center;justify-content:center;animation:fadeIn .25s ease}
#pw-ov.open{display:flex}
.pw-card{background:#fff;border-radius:14px;padding:2.3rem;width:min(320px,92vw);text-align:center}
.pw-tit{font-family:'Noto Serif KR',serif;font-size:1.22rem;font-weight:700;color:var(--dark);margin-bottom:.3rem}
.pw-sub{font-size:.8rem;color:var(--taupe);margin-bottom:1.35rem}
.pw-dots{display:flex;gap:.8rem;justify-content:center;margin-bottom:1.25rem}
.pw-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--sand);transition:all .2s}
.pw-dot.on{background:var(--terra);border-color:var(--terra)}
.pw-dot.er{background:#C44;border-color:#C44;animation:shake .4s ease}
.pw-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
.pw-k{aspect-ratio:1;border:none;background:var(--hi);border-radius:8px;font-family:'Playfair Display',serif;font-size:1.22rem;color:var(--dark);cursor:pointer;transition:background .15s}
.pw-k:hover{background:var(--sand)}.pw-k:active{background:var(--terra);color:#fff}
.pw-k:disabled{visibility:hidden}
#pw-err{color:#C44;font-size:.77rem;margin-top:.45rem;min-height:1.2em}

/* ════════════════════════ ADMIN PANEL ════════════════════════ */
#adm-ov{display:none;position:fixed;inset:0;background:rgba(44,24,16,.72);z-index:100;justify-content:flex-end;animation:fadeIn .3s ease}
#adm-ov.open{display:flex}
#adm-pan{width:min(560px,100vw);height:100vh;background:#FFF9F4;display:flex;flex-direction:column;animation:slideR .35s ease;overflow:hidden}
#adm-hdr{background:var(--dark);color:var(--cream);padding:1.35rem 1.75rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.adm-htit{font-family:'Noto Serif KR',serif;font-size:1.03rem;font-weight:600}
#adm-x{background:none;border:none;color:var(--cream);font-size:1.5rem;cursor:pointer;opacity:.6;transition:opacity .2s;line-height:1}
#adm-x:hover{opacity:1}
.adm-tabs{display:flex;border-bottom:1px solid var(--sand);background:#fff;flex-shrink:0}
.adm-tab{flex:1;padding:.72rem .2rem;font-size:.71rem;text-align:center;border:none;background:none;cursor:pointer;color:var(--taupe);border-bottom:2px solid transparent;transition:all .2s}
.adm-tab.on{color:var(--terra);border-bottom-color:var(--terra);font-weight:500}
#adm-body{flex:1;overflow-y:auto;padding:1.75rem}
.adm-pg{display:none}.adm-pg.on{display:block}
.adm-fld{margin-bottom:1.2rem}
.adm-lbl{display:block;font-size:.76rem;font-weight:500;color:var(--taupe);margin-bottom:.4rem;letter-spacing:.04em}
.adm-in,.adm-ta{width:100%;border:1.5px solid var(--sand);border-radius:6px;padding:.65rem .9rem;font-family:'Noto Sans KR',sans-serif;font-size:.87rem;color:var(--dark);background:#fff;outline:none;transition:border-color .2s}
.adm-in:focus,.adm-ta:focus{border-color:var(--terra)}
.adm-ta{resize:vertical;min-height:82px;line-height:1.65}
.adm-save{flex-shrink:0;background:#fff;border-top:1px solid var(--sand);padding:.9rem 1.75rem;display:flex;gap:.75rem;justify-content:flex-end}

/* buttons */
.btn{padding:.58rem 1.1rem;border-radius:6px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:500;transition:all .2s;line-height:1.4}
.btn-pri{background:var(--terra);color:#fff}.btn-pri:hover{background:#B5612B}
.btn-sec{background:var(--sand);color:var(--dark)}.btn-sec:hover{background:#D8C5A8}
.btn-dan{background:#FEE2E2;color:#C44;border:none}.btn-dan:hover{background:#FECACA}
.btn-gho{background:transparent;border:1.5px solid var(--sand);color:var(--taupe)}
.btn-ai{background:linear-gradient(135deg,#6B56A8,#3D2A7A);color:#fff;width:100%}.btn-ai:hover{filter:brightness(1.12)}.btn-ai:disabled{opacity:.5;cursor:not-allowed}

/* mode toggle */
.mode-tog{display:flex;gap:.5rem;margin-bottom:1.1rem}
.mode-b{flex:1;padding:.6rem .3rem;border:1.5px solid var(--sand);border-radius:6px;background:#fff;cursor:pointer;font-size:.74rem;color:var(--taupe);text-align:center;transition:all .2s}
.mode-b.on{border-color:var(--terra);background:#FFF0E8;color:var(--terra);font-weight:500}

/* menu card */
.adm-mc{background:#fff;border:1.5px solid var(--sand);border-radius:8px;padding:1.3rem;margin-bottom:.9rem}
.adm-mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;padding-bottom:.7rem;border-bottom:1px solid var(--sand)}
.adm-mn{font-family:'Playfair Display',serif;font-size:.87rem;color:var(--terra);font-style:italic}

/* image upload */
.img-up{border:2px dashed var(--sand);border-radius:6px;padding:1.1rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;background:#fff}
.img-up:hover{border-color:var(--terra)}
.img-up input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-prev{max-height:108px;border-radius:4px;object-fit:cover;width:100%}
.img-hint{font-size:.82rem;color:var(--taupe)}.img-hint span{font-size:2rem;display:block;margin-bottom:.35rem}

/* divider, info */
.div{height:1px;background:var(--sand);margin:1.5rem 0}
.info-box{background:var(--hi);border-radius:6px;padding:.7rem .9rem;font-size:.76rem;color:var(--taupe);line-height:1.68}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:5px}

/* grid 2col helper */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}

/* TOAST */
#toast{display:none;position:fixed;bottom:6rem;left:50%;background:var(--dark);color:var(--cream);padding:.72rem 1.35rem;border-radius:30px;font-size:.87rem;z-index:500;white-space:nowrap;animation:toastIn .3s ease;transform:translateX(-50%)}

/* ════ RESPONSIVE ════ */
@media(max-width:700px){
  .layout-single,.layout-multi{grid-template-columns:1fr}
  .layout-multi.flip .mn-img-wrap{order:0}.layout-multi.flip .mn-txt{order:0}
  .ct-in{grid-template-columns:1fr;gap:2rem}
  .g2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     PUBLIC SITE
══════════════════════════════════════════ -->

<!-- HERO -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-ov"></div>
  <div id="hero-ct">
    <div class="h-sub" id="hero-tagline">매일 다른 이야기, 매일 같은 정성</div>
    <h1 class="h-name" id="hero-name">오늘의 밥상</h1>
    <p id="hero-msg">오늘도 새벽 5시에<br>시장에 다녀왔습니다.</p>
  </div>
  <div id="hero-scroll" onclick="document.getElementById('menu-sec').scrollIntoView({behavior:'smooth'})">
    <span>오늘의 이야기 보기</span>
    <span style="font-size:1.1rem">↓</span>
  </div>
</section>

<!-- MENUS -->
<section id="menu-sec">
  <div class="sec">
    <div class="sec-lbl">오늘의 메뉴</div>
    <h2 class="sec-ttl">오늘은 이걸 드셔보세요</h2>
    <div id="menu-area"></div>
    <div id="side-area"></div>
  </div>
</section>

<!-- REVIEWS -->
<div id="rev-sec">
  <div class="rev-in">
    <div class="sec-lbl" style="color:var(--terra)">단골 후기</div>
    <h2 class="sec-ttl" style="color:var(--cream)">손님들이 남긴 따뜻한 이야기</h2>
    <div id="rev-grid"></div>
  </div>
</div>

<!-- CONTACT -->
<div id="ct-sec">
  <div class="ct-in">
    <div>
      <div class="sec-lbl">찾아오시는 길</div>
      <h2 class="sec-ttl" style="font-size:clamp(1.5rem,3vw,2.2rem)" id="ct-name">오늘의 밥상</h2>
      <div style="margin-top:2rem" id="ct-rows"></div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center">
      <div class="ct-motto">
        <div style="font-family:'Dancing Script',cursive;font-size:1.88rem;color:var(--terra);margin-bottom:1rem">내일도 기다리고 있습니다</div>
        <div style="font-size:.82rem;color:var(--taupe);line-height:1.9">매일 아침 신선한 재료로 준비합니다.<br>내일 메뉴는 내일 아침에 업데이트됩니다.</div>
      </div>
    </div>
  </div>
  <p id="ct-footer"></p>
</div>

<!-- Admin trigger -->
<button id="adm-btn" title="관리자 페이지">✏️</button>

<!-- ══════════════════════════════════════════
     PASSWORD MODAL
══════════════════════════════════════════ -->
<div id="pw-ov">
  <div class="pw-card">
    <div class="pw-tit">🔑 관리자 모드</div>
    <div class="pw-sub">4자리 비밀번호를 입력하세요<br><span style="font-size:.73rem;color:#bbb">기본값: 0000</span></div>
    <div class="pw-dots" id="pw-dots">
      <div class="pw-dot" id="d0"></div>
      <div class="pw-dot" id="d1"></div>
      <div class="pw-dot" id="d2"></div>
      <div class="pw-dot" id="d3"></div>
    </div>
    <div class="pw-pad" id="pw-pad">
      <button class="pw-k" data-k="1">1</button><button class="pw-k" data-k="2">2</button><button class="pw-k" data-k="3">3</button>
      <button class="pw-k" data-k="4">4</button><button class="pw-k" data-k="5">5</button><button class="pw-k" data-k="6">6</button>
      <button class="pw-k" data-k="7">7</button><button class="pw-k" data-k="8">8</button><button class="pw-k" data-k="9">9</button>
      <button class="pw-k" disabled></button><button class="pw-k" data-k="0">0</button><button class="pw-k" data-k="del">⌫</button>
    </div>
    <div id="pw-err"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     ADMIN PANEL
══════════════════════════════════════════ -->
<div id="adm-ov">
  <div id="adm-pan">
    <div id="adm-hdr">
      <span class="adm-htit">🍽️ 사장님 관리 페이지</span>
      <button id="adm-x">×</button>
    </div>
    <div class="adm-tabs">
      <button class="adm-tab on" data-t="0">오늘 이야기</button>
      <button class="adm-tab" data-t="1">메뉴 관리</button>
      <button class="adm-tab" data-t="2">후기 관리</button>
      <button class="adm-tab" data-t="3">매장 정보</button>
    </div>

    <div id="adm-body">

      <!-- TAB 0: 오늘 이야기 -->
      <div class="adm-pg on" id="pg0">
        <div class="adm-fld"><label class="adm-lbl">가게 이름</label><input class="adm-in" id="f-name"></div>
        <div class="adm-fld"><label class="adm-lbl">슬로건 / 태그라인</label><input class="adm-in" id="f-tagline"></div>
        <div class="adm-fld"><label class="adm-lbl">오늘의 한마디 (줄바꿈 가능)</label><textarea class="adm-ta" id="f-msg" rows="3" placeholder="오늘 손님들께 전하고 싶은 한 마디..."></textarea></div>
        <div class="adm-fld">
          <label class="adm-lbl">대표 사진 (첫 화면 배경)</label>
          <button class="btn btn-dan" id="hero-img-del" style="font-size:.7rem;padding:.22rem .55rem;margin-bottom:.4rem;display:none">사진 삭제</button>
          <div class="img-up" id="hero-img-up">
            <input type="file" accept="image/*" id="hero-img-inp">
            <div class="img-hint"><span>📸</span>가게 대표 사진 업로드<br><small style="opacity:.65">JPG · PNG · WEBP</small></div>
            <img id="hero-img-prev" class="img-prev" style="display:none">
          </div>
        </div>
        <div class="adm-fld">
          <label class="adm-lbl">메뉴 표시 방식</label>
          <div class="mode-tog">
            <button class="mode-b" data-m="single">📌 단품 집중</button>
            <button class="mode-b on" data-m="multi">📖 멀티 스토리</button>
            <button class="mode-b" data-m="list">📋 리스트</button>
          </div>
          <div class="info-box" id="mode-info"></div>
        </div>
      </div>

      <!-- TAB 1: 메뉴 관리 -->
      <div class="adm-pg" id="pg1">
        <div style="font-size:.82rem;color:var(--taupe);margin-bottom:1rem" id="mode-hint"></div>
        <div id="menu-cards"></div>
        <button class="btn btn-sec" style="width:100%;padding:.82rem;font-size:.87rem;margin-bottom:1.5rem" id="add-menu-btn">+ 메뉴 추가</button>
        <div class="div"></div>

<!-- ══════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════ -->
<script>
// ── DATA ─────────────────────────────────────────────────────
const GRADS = [
  'linear-gradient(135deg,#C4713A,#8B4513 55%,#2C1810)',
  'linear-gradient(135deg,#8B6F5E,#5C3D2E 55%,#2C1810)',
  'linear-gradient(135deg,#D4A574,#A0714F 55%,#5C3D2E)',
];

const DEFAULT = {
  store:{ name:'오늘의 밥상', tagline:'매일 다른 이야기, 매일 같은 정성' },
  hero:{ image:'', msg:'오늘도 새벽 5시에\n시장에 다녀왔습니다.' },
  menuMode:'multi',
  menus:[
    { id:1, title:'오늘의 된장찌개 정식', price:'8,500원', story:'경북 안동에서 직접 공수한 재래식 된장으로 끓였습니다. 어머니께서 20년간 지켜온 비율 그대로, 단 하나도 바꾸지 않았습니다.', image:'', tag:'오늘의 추천' },
    { id:2, title:'제철 나물 비빔밥', price:'9,000원', story:'이른 아침 광장시장에서 골라온 봄나물들. 무침 하나하나에 참기름 한 방울씩 더 넣었습니다.', image:'', tag:'제철 한정' },
  ],
  sides:[
    { id:1, name:'공기밥 추가', price:'500원' },
    { id:2, name:'계란후라이', price:'500원' },
    { id:3, name:'식혜', price:'1,500원' },
    { id:4, name:'수정과', price:'1,500원' },
  ],
  reviews:[
    { id:1, name:'단골 김○○', text:'10년째 오고 있어요. 아직도 처음 먹던 그 맛이에요.', date:'2025.05.12' },
    { id:2, name:'직장인 이○○', text:'점심시간마다 여기 생각이 나요. 사장님 손맛이 진짜예요.', date:'2025.05.14' },
    { id:3, name:'가족 단위 방문객', text:'아이도 잘 먹어요. 재료가 신선해서 믿고 올 수 있어요.', date:'2025.05.16' },
  ],
  contact:{ hours:'월–금 11:00 – 15:00', address:'서울시 마포구 망원동 123-45', phone:'02-XXX-XXXX', closed:'토·일·공휴일 휴무' },
  pw:'0000',
};

let DATA = deepCopy(DEFAULT);
let DRAFT = deepCopy(DEFAULT);

function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

// ── STORAGE ──────────────────────────────────────────────────
const SK = 'sbs_store_v1';
function loadData(){
  try{
    const s = localStorage.getItem(SK);
    if(s){ DATA = {...deepCopy(DEFAULT), ...JSON.parse(s)}; }
  }catch(e){}
}
function saveData(){
  try{ localStorage.setItem(SK, JSON.stringify(DATA)); }catch(e){}
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ el.style.display='none'; }, 2700);
}

// ── SCROLL REVEAL ────────────────────────────────────────────
function initReveal(){
  const els = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target);} });
  },{threshold:0.08});
  els.forEach(el=>io.observe(el));
}

// ══════════════════════════════════════════
//  RENDER PUBLIC SITE
// ══════════════════════════════════════════
function render(){
  const d = DATA;

  // Hero
  document.title = d.store.name;
  document.getElementById('hero-name').textContent = d.store.name;
  document.getElementById('hero-tagline').textContent = d.store.tagline;
  document.getElementById('hero-msg').innerHTML = d.hero.msg.replace(/\n/g,'<br>');
  const bg = document.getElementById('hero-bg');
  bg.style.background = d.hero.image
    ? `url(${d.hero.image}) center/cover no-repeat`
    : 'linear-gradient(160deg,#5C3D2E 0%,#2C1810 100%)';

  // Contact
  document.getElementById('ct-name').textContent = d.store.name;
  document.getElementById('ct-footer').textContent = `© ${d.store.name} · 매일 정성껏 준비합니다.`;
  const rows = [
    {l:'영업시간',v:d.contact.hours},
    {l:'주소',v:d.contact.address},
    {l:'전화',v:d.contact.phone},
    {l:'휴무',v:d.contact.closed},
  ];
  document.getElementById('ct-rows').innerHTML = rows.map(r=>`
    <div class="ct-row">
      <span class="ct-lbl">${r.l}</span>
      <span class="ct-val">${r.v}</span>
    </div>`).join('');

  // Menus
  renderMenus();

  // Reviews
  document.getElementById('rev-grid').innerHTML = d.reviews.map(r=>`
    <div class="rev-card reveal">
      <div class="rev-q">"</div>
      <p class="rev-txt">${r.text}</p>
      <div class="rev-nm">${r.name}</div>
      <div class="rev-dt">${r.date}</div>
    </div>`).join('');

  // Sides
  const sideArea = document.getElementById('side-area');
  if(d.sides.length){
    sideArea.innerHTML = `
      <div style="margin-top:4rem" class="reveal">
        <div class="sec-lbl">사이드 &amp; 음료</div>
        <div class="layout-list">
          ${d.sides.map(s=>`<div class="side-row"><span class="s-nm">${s.name}</span><span class="s-pr">${s.price}</span></div>`).join('')}
        </div>
      </div>`;
  } else {
    sideArea.innerHTML = '';
  }

  setTimeout(initReveal, 100);
}

function renderMenus(){
  const d = DATA;
  const area = document.getElementById('menu-area');
  const mode = d.menuMode;

  if(mode === 'single'){
    const m = d.menus[0];
    if(!m){ area.innerHTML=''; return; }
    area.innerHTML = `
      <div class="layout-single reveal">
        <div class="mn-img-wrap">${imgOrPh(m.image, GRADS[0])}</div>
        <div class="mn-txt">
          ${m.tag?`<span class="mn-tag">${m.tag}</span>`:''}
          <h3 class="mn-name">${m.title}</h3>
          <p class="mn-story">${m.story}</p>
          <p class="mn-price">${m.price}</p>
        </div>
      </div>`;
  } else if(mode === 'multi'){
    area.innerHTML = d.menus.map((m,i)=>`
      <div class="layout-multi reveal ${i%2===1?'flip':''}">
        <div class="mn-img-wrap">${imgOrPh(m.image, GRADS[i%GRADS.length])}</div>
        <div class="mn-txt">
          ${m.tag?`<span class="mn-tag">${m.tag}</span>`:''}
          <h3 class="mn-name">${m.title}</h3>
          <p class="mn-story">${m.story}</p>
          <p class="mn-price">${m.price}</p>
        </div>
      </div>`).join('');
  } else {
    area.innerHTML = `
      <div class="reveal" style="margin-top:2rem">
        <div class="layout-list">
          ${d.menus.map(m=>`<div class="side-row"><span class="s-nm">${m.title}</span><span class="s-pr">${m.price}</span></div>`).join('')}
        </div>
      </div>`;
  }
}

function imgOrPh(src, grad){
  if(src) return `<img src="${src}" alt="메뉴 사진" loading="lazy">`;
  return `<div class="mn-ph" style="background:${grad}">🍱</div>`;
}

// ══════════════════════════════════════════
//  PASSWORD
// ══════════════════════════════════════════
let pwInput = '';
let pwError = false;

function openPw(){
  pwInput = '';
  pwError = false;
  updateDots();
  document.getElementById('pw-err').textContent = '';
  document.getElementById('pw-ov').classList.add('open');
}
function closePw(){
  document.getElementById('pw-ov').classList.remove('open');
  pwInput = '';
}
function updateDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('d'+i);
    d.classList.remove('on','er');
    if(pwError) d.classList.add('er');
    else if(i < pwInput.length) d.classList.add('on');
  }
}
function tapKey(k){
  if(pwError) return;
  if(k==='del'){ pwInput=pwInput.slice(0,-1); updateDots(); return; }
  pwInput += k;
  updateDots();
  if(pwInput.length===4){
    if(pwInput === DATA.pw){
      closePw();
      openAdmin();
    } else {
      pwError=true;
      updateDots();
      document.getElementById('pw-err').textContent='비밀번호가 틀렸습니다';
      setTimeout(()=>{ pwInput=''; pwError=false; updateDots(); document.getElementById('pw-err').textContent=''; },800);
    }
  }
}

document.getElementById('pw-pad').addEventListener('click',e=>{
  const k = e.target.dataset.k;
  if(k!==undefined) tapKey(k);
});
document.getElementById('pw-ov').addEventListener('click',e=>{
  if(e.target===document.getElementById('pw-ov')) closePw();
});
document.getElementById('adm-btn').addEventListener('click',openPw);

// ══════════════════════════════════════════
//  ADMIN PANEL
// ══════════════════════════════════════════
function openAdmin(){
  DRAFT = deepCopy(DATA);
  populateAdmin();
  document.getElementById('adm-ov').classList.add('open');
}
function closeAdmin(){
  document.getElementById('adm-ov').classList.remove('open');
}

document.getElementById('adm-x').addEventListener('click', closeAdmin);
document.getElementById('adm-cancel').addEventListener('click', closeAdmin);
document.getElementById('adm-ov').addEventListener('click',e=>{
  if(e.target===document.getElementById('adm-ov')) closeAdmin();
});

// Tabs
document.querySelectorAll('.adm-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.adm-tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.adm-pg').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('pg'+btn.dataset.t).classList.add('on');
  });
});

// ── POPULATE ADMIN FIELDS ────────────────────
function populateAdmin(){
  const d = DRAFT;

  // Tab 0
  document.getElementById('f-name').value = d.store.name;
  document.getElementById('f-tagline').value = d.store.tagline;
  document.getElementById('f-msg').value = d.hero.msg;
  setHeroImg(d.hero.image);

  // Mode buttons
  document.querySelectorAll('.mode-b').forEach(b=>{
    b.classList.toggle('on', b.dataset.m === d.menuMode);
  });
  updateModeInfo(d.menuMode);

  // Tab 1
  renderMenuCards();
  renderSideCards();

  // Tab 2
  renderRevCards();

  // Tab 3
  document.getElementById('f-hours').value = d.contact.hours;
  document.getElementById('f-address').value = d.contact.address;
  document.getElementById('f-phone').value = d.contact.phone;
  document.getElementById('f-closed').value = d.contact.closed;
  document.getElementById('f-pw').value = '';
  document.getElementById('pw-hint').textContent = `현재 비밀번호: ${d.pw}`;
}

// ── HERO IMAGE ────────────────────────────────
function setHeroImg(src){
  const prev = document.getElementById('hero-img-prev');
  const hint = document.querySelector('#hero-img-up .img-hint');
  const del = document.getElementById('hero-img-del');
  if(src){
    prev.src=src; prev.style.display='block';
    if(hint) hint.style.display='none';
    del.style.display='inline-block';
  } else {
    prev.src=''; prev.style.display='none';
    if(hint) hint.style.display='block';
    del.style.display='none';
  }
}
document.getElementById('hero-img-inp').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  readFile(f,v=>{ DRAFT.hero.image=v; setHeroImg(v); });
});
document.getElementById('hero-img-del').addEventListener('click',()=>{ DRAFT.hero.image=''; setHeroImg(''); });

// ── MODE TOGGLE ────────────────────────────────
const MINFO = {
  single:'✓ 단품 집중 — 하나의 메인 메뉴를 사진+스토리로 크게 강조하는 잡지형 레이아웃',
  multi:'✓ 멀티 스토리 — 2~3개의 특식을 각각의 스토리·사진과 함께 좌우 교차 배치',
  list:'✓ 리스트 — 여러 메뉴를 깔끔한 이름+가격 텍스트로 나열 (사이드 메뉴 스타일)',
};
function updateModeInfo(m){
  document.getElementById('mode-info').textContent = MINFO[m]||'';
  const hints = { single:'단품 모드: 첫 번째 메뉴만 표시됩니다.', multi:'멀티 모드: 등록된 모든 메뉴가 교차 배치됩니다.', list:'리스트 모드: 모든 메뉴가 텍스트로 나열됩니다.' };
  document.getElementById('mode-hint').textContent = hints[m]||'';
}
document.querySelectorAll('.mode-b').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mode-b').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    DRAFT.menuMode = b.dataset.m;
    updateModeInfo(b.dataset.m);
  });
});

// ── MENU CARDS ────────────────────────────────
function renderMenuCards(){
  const wrap = document.getElementById('menu-cards');
  wrap.innerHTML = '';
  DRAFT.menus.forEach((m,i)=>{
    const el = document.createElement('div');
    el.className='adm-mc';
    el.dataset.id = m.id;
    el.innerHTML = `
      <div class="adm-mh">
        <span class="adm-mn">메뉴 ${i+1}</span>
        <button class="btn btn-dan" style="font-size:.72rem;padding:.26rem .62rem" onclick="delMenu(${m.id})">삭제</button>
      </div>
      <div class="adm-fld"><label class="adm-lbl">메뉴명</label>
        <input class="adm-in" value="${esc(m.title)}" placeholder="예: 오늘의 된장찌개 정식" oninput="updMenu(${m.id},'title',this.value)"></div>
      <div class="g2">
        <div class="adm-fld"><label class="adm-lbl">가격</label>
          <input class="adm-in" value="${esc(m.price)}" placeholder="8,500원" oninput="updMenu(${m.id},'price',this.value)"></div>
        <div class="adm-fld"><label class="adm-lbl">태그</label>
          <input class="adm-in" value="${esc(m.tag)}" placeholder="오늘의 추천" oninput="updMenu(${m.id},'tag',this.value)"></div>
      </div>
      <div class="adm-fld"><label class="adm-lbl">스토리텔링</label>
        <textarea class="adm-ta" rows="3" placeholder="이 메뉴에 담긴 이야기..." oninput="updMenu(${m.id},'story',this.value)">${esc(m.story)}</textarea></div>
      <div class="adm-fld">
        <label class="adm-lbl">✨ AI 스토리 자동 작성</label>
        <input class="adm-in" id="ai-ing-${m.id}" placeholder="재료·특징 입력 (예: 안동 된장, 두부, 애호박)" style="margin-bottom:.42rem">
        <button class="btn btn-ai" id="ai-btn-${m.id}" onclick="doAI(${m.id})">✨ AI가 스토리를 자동으로 작성합니다</button>
      </div>
      <div class="adm-fld">
        <label class="adm-lbl">메뉴 사진</label>
        <button class="btn btn-dan" style="font-size:.7rem;padding:.22rem .55rem;margin-bottom:.38rem;display:${m.image?'inline-block':'none'}" id="mimg-del-${m.id}" onclick="delMenuImg(${m.id})">사진 삭제</button>
        <div class="img-up">
          <input type="file" accept="image/*" onchange="uploadMenuImg(${m.id},this)">
          ${m.image
            ? `<img src="${m.image}" class="img-prev" id="mimg-prev-${m.id}">`
            : `<div class="img-hint" id="mimg-hint-${m.id}"><span>📸</span>메뉴 사진 업로드</div><img class="img-prev" style="display:none" id="mimg-prev-${m.id}">`}
        </div>
      </div>`;
    wrap.appendChild(el);
  });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function updMenu(id,k,v){ const m=DRAFT.menus.find(x=>x.id===id); if(m) m[k]=v; }
function delMenu(id){
  if(DRAFT.menus.length<=1){ toast('최소 1개의 메뉴가 필요합니다'); return; }
  DRAFT.menus = DRAFT.menus.filter(m=>m.id!==id);
  renderMenuCards();
}
function uploadMenuImg(id,inp){
  const f=inp.files[0]; if(!f) return;
  readFile(f,v=>{
    updMenu(id,'image',v);
    const prev=document.getElementById('mimg-prev-'+id);
    const hint=document.getElementById('mimg-hint-'+id);
    const del=document.getElementById('mimg-del-'+id);
    if(prev){ prev.src=v; prev.style.display='block'; }
    if(hint) hint.style.display='none';
    if(del) del.style.display='inline-block';
  });
}
function delMenuImg(id){
  updMenu(id,'image','');
  const prev=document.getElementById('mimg-prev-'+id);
  const hint=document.getElementById('mimg-hint-'+id);
  const del=document.getElementById('mimg-del-'+id);
  if(prev){ prev.src=''; prev.style.display='none'; }
  if(hint) hint.style.display='block';
  if(del) del.style.display='none';
}

document.getElementById('add-menu-btn').addEventListener('click',()=>{
  DRAFT.menus.push({ id:Date.now(), title:'', price:'', story:'', image:'', tag:'신메뉴' });
  renderMenuCards();
});

// ── AI STORY ──────────────────────────────────
async function doAI(id){
  const m = DRAFT.menus.find(x=>x.id===id);
  if(!m?.title){ toast('메뉴명을 먼저 입력해주세요'); return; }
  const ing = document.getElementById('ai-ing-'+id)?.value||'';
  const btn = document.getElementById('ai-btn-'+id);
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>AI 스토리 작성 중...';
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:
`당신은 소상공인 음식점 사장님의 따뜻한 감성 스토리텔링 작가입니다.
아래 메뉴에 대해 짧고 감성적인 스토리(90~140자)를 한국어로 써주세요.
재료 산지, 손님에 대한 마음, 만드는 과정의 진정성을 담아 1인칭 사장님 시점으로.
스토리 텍스트만 출력하고 다른 설명은 절대 쓰지 마세요.

메뉴명: ${m.title}
재료/특징: ${ing||'신선한 국산 재료'}`}]
      })
    });
    const data = await res.json();
    const story = data.content?.[0]?.text?.trim()||'';
    if(story){
      m.story=story;
      // update textarea
      const ta=document.querySelector(`[data-id="${id}"] .adm-ta`);
      if(ta) ta.value=story;
      toast('✨ 스토리가 작성되었습니다!');
    }
  }catch(e){ toast('AI 연결 오류. 다시 시도해주세요.'); }
  btn.disabled=false;
  btn.innerHTML='✨ AI가 스토리를 자동으로 작성합니다';
}

// ── SIDE CARDS ────────────────────────────────
function renderSideCards(){
  const wrap = document.getElementById('side-cards');
  wrap.innerHTML = '';
  DRAFT.sides.forEach((s,i)=>{
    const el=document.createElement('div');
    el.style.cssText='display:flex;gap:.45rem;margin-bottom:.45rem;align-items:center';
    el.innerHTML=`
      <input class="adm-in" value="${esc(s.name)}" placeholder="메뉴명" style="flex:2" oninput="updSide(${i},'name',this.value)">
      <input class="adm-in" value="${esc(s.price)}" placeholder="가격" style="flex:1" oninput="updSide(${i},'price',this.value)">
      <button class="btn btn-dan" style="padding:.58rem .68rem;flex-shrink:0" onclick="delSide(${i})">✕</button>`;
    wrap.appendChild(el);
  });
}
function updSide(i,k,v){ if(DRAFT.sides[i]) DRAFT.sides[i][k]=v; }
function delSide(i){ DRAFT.sides.splice(i,1); renderSideCards(); }
document.getElementById('add-side-btn').addEventListener('click',()=>{
  DRAFT.sides.push({ id:Date.now(), name:'', price:'' });
  renderSideCards();
});

// ── REVIEW CARDS ──────────────────────────────
function renderRevCards(){
  const wrap = document.getElementById('rev-cards');
  wrap.innerHTML='';
  DRAFT.reviews.forEach((r,i)=>{
    const el=document.createElement('div');
    el.className='adm-mc';
    el.innerHTML=`
      <div class="adm-mh">
        <span class="adm-mn">후기 ${i+1}</span>
        <button class="btn btn-dan" style="font-size:.72rem;padding:.26rem .62rem" onclick="delRev(${i})">삭제</button>
      </div>
      <div class="g2">
        <div class="adm-fld"><label class="adm-lbl">손님 이름</label>
          <input class="adm-in" value="${esc(r.name)}" placeholder="단골 김○○" oninput="updRev(${i},'name',this.value)"></div>
        <div class="adm-fld"><label class="adm-lbl">날짜</label>
          <input class="adm-in" value="${esc(r.date)}" placeholder="2025.05.12" oninput="updRev(${i},'date',this.value)"></div>
      </div>
      <div class="adm-fld"><label class="adm-lbl">후기 내용</label>
        <textarea class="adm-ta" rows="2" oninput="updRev(${i},'text',this.value)">${esc(r.text)}</textarea></div>`;
    wrap.appendChild(el);
  });
}
function updRev(i,k,v){ if(DRAFT.reviews[i]) DRAFT.reviews[i][k]=v; }
function delRev(i){ DRAFT.reviews.splice(i,1); renderRevCards(); }
document.getElementById('add-rev-btn').addEventListener('click',()=>{
  DRAFT.reviews.push({ id:Date.now(), name:'', text:'', date:new Date().toLocaleDateString('ko-KR') });
  renderRevCards();
});

// ── SAVE ──────────────────────────────────────
document.getElementById('adm-save-btn').addEventListener('click',()=>{
  // Collect Tab 0
  DRAFT.store.name = document.getElementById('f-name').value;
  DRAFT.store.tagline = document.getElementById('f-tagline').value;
  DRAFT.hero.msg = document.getElementById('f-msg').value;

  // Tab 3
  DRAFT.contact.hours = document.getElementById('f-hours').value;
  DRAFT.contact.address = document.getElementById('f-address').value;
  DRAFT.contact.phone = document.getElementById('f-phone').value;
  DRAFT.contact.closed = document.getElementById('f-closed').value;

  const newPw = document.getElementById('f-pw').value;
  if(newPw && /^\d{4}$/.test(newPw)) DRAFT.pw = newPw;

  DATA = deepCopy(DRAFT);
  saveData();
  render();
  toast('✅ 저장되었습니다!');
  closeAdmin();
});

// ── FILE READER ───────────────────────────────
function readFile(file,cb){
  const r=new FileReader();
  r.onload=()=>cb(r.result);
  r.readAsDataURL(file);
}

// ── INIT ──────────────────────────────────────
loadData();
render();
</script>
